services:
  # ── Backend: agent orchestration server ──────────────────────────────────────
  backend:
    build: .
    image: pi-agent:latest
    restart: unless-stopped
    command: ["bun", "run", "/home/agent/backend/src/index.ts"]
    environment:
      APP_ENV: production
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      PI_PROVIDER: ${PI_PROVIDER}
      PI_MODEL: ${PI_MODEL}
      GIT_USER_EMAIL: ${GIT_USER_EMAIL}
      GIT_USER_NAME: ${GIT_USER_NAME}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      BACKEND_HOST: "0.0.0.0"
      BACKEND_PORT: "3100"
      WORKSPACE: /workspace
      SESSION_STORAGE: /data/agent-sessions
      LOG_LEVEL: ${LOG_LEVEL}
      # ── Target project settings ────────────────────
      TARGET_SOURCE_REPO: ${TARGET_SOURCE_REPO}
      TARGET_DATA_DIR: /data/target
      TARGET_PORT_MIN: ${TARGET_PORT_MIN}
      TARGET_PORT_MAX: ${TARGET_PORT_MAX}
    ports:
      - "${BACKEND_PORT}:3100"
      - "${TARGET_PORT_MIN}-${TARGET_PORT_MAX}:${TARGET_PORT_MIN}-${TARGET_PORT_MAX}"
    volumes:
      - ./data/workspace:/workspace
      - ./data/pi-home:/home/agent/.pi
      - ./data/agent-sessions:/data/agent-sessions
      - ./data/target:/data/target

  # ── Web frontend: variation manager UI (experimental) ────────────────────────
  web:
    profiles: ["web"]
    build:
      context: ./web-variations-frontend
    restart: unless-stopped
    ports:
      - "${WEB_PORT}:3000"
    environment:
      BACKEND_URL: http://backend:3100
    depends_on:
      - backend

  # ── Telegram frontend ───────────────────────────────────────────────────────
  telegram:
    profiles: ["telegram"]
    build: .
    image: pi-agent:latest
    restart: unless-stopped
    command: ["bun", "run", "/home/agent/telegram-frontend/src/index.ts"]
    depends_on:
      - backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      ALLOWED_CHAT_IDS: ${ALLOWED_CHAT_IDS}
      BACKEND_URL: http://backend:3100
      BACKEND_WS_URL: ws://backend:3100/ws
      HOST_RUNNER_URL: ${HOST_RUNNER_URL:-http://host.docker.internal:3200}
      HOST_RUNNER_WS_URL: ${HOST_RUNNER_WS_URL:-ws://host.docker.internal:3200/ws}
      WORKSPACE: /workspace
      PI_PROVIDER: ${PI_PROVIDER}
      PI_MODEL: ${PI_MODEL}

  # ── Discord frontend ────────────────────────────────────────────────────────
  discord:
    profiles: ["discord"]
    build: .
    image: pi-agent:latest
    restart: unless-stopped
    command: ["bun", "run", "/home/agent/discord-frontend/src/index.ts"]
    depends_on:
      - backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      ALLOWED_CHANNEL_IDS: ${ALLOWED_CHANNEL_IDS}
      DISCORD_COMMAND_PREFIX: ${DISCORD_COMMAND_PREFIX:-!}
      BACKEND_URL: http://backend:3100
      BACKEND_WS_URL: ws://backend:3100/ws
      HOST_RUNNER_URL: ${HOST_RUNNER_URL:-http://host.docker.internal:3200}
      HOST_RUNNER_WS_URL: ${HOST_RUNNER_WS_URL:-ws://host.docker.internal:3200/ws}
      WORKSPACE: /workspace
      PI_PROVIDER: ${PI_PROVIDER}
      PI_MODEL: ${PI_MODEL}

