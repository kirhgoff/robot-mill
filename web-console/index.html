<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0a0a12" />
<title>robot-mill // console</title>
<style>
  :root {
    --bg: #0a0a12; --panel: #11111d; --panel2: #171728;
    --fg: #d7d7ee; --dim: #6b6b8a; --line: #26263b;
    --accent: #ff2bd6; --accent2: #00e5ff;
    --ok: #21e6a0; --warn: #ffcf3a; --err: #ff4d6d;
    --font: "JetBrains Mono", "SFMono-Regular", ui-monospace, Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    color: var(--fg); font-family: var(--font);
    font-size: 14px; line-height: 1.45; overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    background: var(--bg);
    background-image: radial-gradient(1100px 700px at 75% -12%, color-mix(in srgb, var(--accent) 9%, transparent), transparent 60%);
    background-attachment: fixed;
  }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 16px 14px 60px; }
  header { border: 1px solid var(--line); background: rgba(17,17,29,0.7); backdrop-filter: blur(3px);
    padding: 12px 14px; margin-bottom: 16px; }
  .logo { color: var(--accent); text-shadow: 0 0 8px color-mix(in srgb, var(--accent) 60%, transparent);
    font-size: clamp(5px, 1.7vw, 11px); line-height: 1.05; white-space: pre; overflow-x: auto; margin: 0 0 8px; }
  .bar { display: flex; flex-wrap: wrap; gap: 8px 14px; align-items: center; justify-content: space-between; }
  .status-pill { display: inline-flex; align-items: center; gap: 8px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
  .dot { width: 10px; height: 10px; border-radius: 50%; box-shadow: 0 0 10px currentColor; }
  .controls { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  button, select {
    font-family: var(--font); font-size: 12px; background: var(--panel2); color: var(--fg);
    border: 1px solid var(--line); padding: 6px 10px; cursor: pointer; border-radius: 2px;
  }
  button:hover { border-color: var(--accent); color: var(--accent); }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
  .card { border: 1px solid var(--line); background: rgba(17,17,29,0.72); padding: 12px 14px; position: relative; }
  .card::before { content: ""; position: absolute; left: 0; top: 0; width: 3px; height: 100%; background: var(--accent); opacity: 0.7; }
  .card h2 { margin: 0 0 10px; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent2); }
  .row { display: flex; align-items: flex-start; gap: 8px; padding: 6px 0; border-bottom: 1px dashed var(--line); }
  .row:last-child { border-bottom: none; }
  .row .name { font-weight: 700; }
  .row .meta { color: var(--dim); font-size: 12px; word-break: break-word; }
  .tag { font-size: 10px; padding: 1px 6px; border: 1px solid var(--line); border-radius: 2px; text-transform: uppercase; letter-spacing: 1px; }
  .tag.run { color: var(--ok); border-color: color-mix(in srgb, var(--ok) 50%, var(--line)); }
  .tag.idle { color: var(--dim); }
  .s-ok { color: var(--ok); } .s-fail, .s-error { color: var(--err); } .s-unknown, .s-unreachable { color: var(--warn); }
  .host { cursor: pointer; }
  .host:hover .name { color: var(--accent); }
  .promptbox { margin-top: 8px; display: none; gap: 6px; }
  .promptbox.open { display: flex; }
  .promptbox input { flex: 1; font-family: var(--font); font-size: 12px; background: var(--bg); color: var(--fg); border: 1px solid var(--line); padding: 6px 8px; }
  .muted { color: var(--dim); }
  .foot { margin-top: 20px; color: var(--dim); font-size: 11px; text-align: center; letter-spacing: 1px; }
  .blink { animation: blink 1.1s steps(2) infinite; } @keyframes blink { 0%{opacity:1} 50%{opacity:0.25} }
  a { color: var(--accent2); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <pre class="logo" id="logo"></pre>
    <div class="bar">
      <span class="status-pill"><span class="dot" id="dot" style="color:var(--warn)"></span><span id="overall">booting…</span></span>
      <div class="controls">
        <select id="theme" title="theme"></select>
        <button id="refresh" title="refresh">↻ sync</button>
      </div>
    </div>
  </header>

  <div class="grid">
    <div class="card"><h2>◈ components</h2><div id="health"><span class="muted blink">scanning…</span></div></div>
    <div class="card"><h2>◈ host runners</h2><div id="hosts"><span class="muted blink">scanning…</span></div></div>
    <div class="card"><h2>◈ agents</h2><div id="agents"><span class="muted blink">scanning…</span></div></div>
    <div class="card"><h2>◈ system</h2><div id="system"><span class="muted blink">scanning…</span></div></div>
    <div class="card" style="grid-column:1/-1">
      <h2>▶ live output <span class="muted" id="streamState" style="text-transform:none;letter-spacing:0">connecting…</span></h2>
      <pre id="log" style="max-height:320px;overflow:auto;margin:0;white-space:pre-wrap;word-break:break-word;font-size:12px"></pre>
    </div>
  </div>
  <div class="foot" id="foot">robot-mill console · <span id="clock"></span></div>
</div>

<script>
const LOGO = String.raw`
 ____   ___  ____   ___ _____   __  __ ___ _     _
|  _ \ / _ \| __ ) / _ \_   _| |  \/  |_ _| |   | |
| |_) | | | |  _ \| | | || |   | |\/| || || |   | |
|  _ <| |_| | |_) | |_| || |   | |  | || || |___| |___
|_| \_\\___/|____/ \___/ |_|   |_|  |_|___|_____|_____|`;
document.getElementById("logo").textContent = LOGO;

const THEMES = {
  cyberpunk: { "--bg":"#0a0a12","--panel":"#11111d","--panel2":"#171728","--fg":"#d7d7ee","--dim":"#6b6b8a","--line":"#26263b","--accent":"#ff2bd6","--accent2":"#00e5ff","--ok":"#21e6a0","--warn":"#ffcf3a","--err":"#ff4d6d", a:[1.0,0.17,0.84], b:[0.0,0.9,1.0] },
  matrix:    { "--bg":"#000600","--panel":"#03140a","--panel2":"#04200f","--fg":"#8affb0","--dim":"#2f7048","--line":"#0d3b22","--accent":"#00ff66","--accent2":"#7dffb0","--ok":"#00ff66","--warn":"#d7ff3a","--err":"#ff5c5c", a:[0.0,1.0,0.4], b:[0.5,1.0,0.7] },
  amber:     { "--bg":"#140c00","--panel":"#1d1401","--panel2":"#241a03","--fg":"#ffd591","--dim":"#8a6a2f","--line":"#3b2a0d","--accent":"#ffb000","--accent2":"#ff7b00","--ok":"#ffd21a","--warn":"#ff9f1a","--err":"#ff5a3c", a:[1.0,0.69,0.0], b:[1.0,0.48,0.0] },
  synthwave: { "--bg":"#160b2e","--panel":"#1e0f3d","--panel2":"#271050","--fg":"#e9d5ff","--dim":"#7c6aa8","--line":"#3a2065","--accent":"#ff6ac1","--accent2":"#6f6cff","--ok":"#4be3c4","--warn":"#ffd84b","--err":"#ff5d8f", a:[1.0,0.42,0.76], b:[0.44,0.42,1.0] },
};

function applyTheme(name) {
  const t = THEMES[name] || THEMES.cyberpunk;
  for (const k in t) if (k.startsWith("--")) document.documentElement.style.setProperty(k, t[k]);
  document.querySelector('meta[name=theme-color]').setAttribute("content", t["--bg"]);
  localStorage.setItem("rm-theme", name);
}

const themeSel = document.getElementById("theme");
for (const name of Object.keys(THEMES)) { const o = document.createElement("option"); o.value = o.textContent = name; themeSel.appendChild(o); }
themeSel.value = localStorage.getItem("rm-theme") || "cyberpunk";
themeSel.onchange = () => applyTheme(themeSel.value);
applyTheme(themeSel.value);

// ── Data + rendering ─────────────────────────────────────
const $ = (id) => document.getElementById(id);
function esc(s){ return String(s).replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }
function ago(ms){ if(!ms) return "—"; const s=Math.round((Date.now()-ms)/1000); if(s<60)return s+"s"; if(s<3600)return Math.round(s/60)+"m"; return Math.round(s/3600)+"h"; }

async function refresh(){
  let d;
  try { d = await (await fetch("/api/overview")).json(); }
  catch(e){ $("overall").textContent = "backend unreachable"; $("dot").style.color="var(--err)"; return; }

  const overall = (d.health && d.health.overall) || "unknown";
  $("overall").textContent = "system " + overall;
  $("dot").style.color = overall==="ok" ? "var(--ok)" : (overall==="degraded"||overall==="unreachable") ? "var(--err)" : "var(--warn)";

  const checks = (d.health && d.health.checks) || [];
  $("health").innerHTML = checks.length ? checks.map(c => `
    <div class="row"><div style="flex:1">
      <span class="name s-${esc(c.status)}">${esc(c.name)}</span>
      <span class="tag s-${esc(c.status)}">${esc(c.status)}</span>
      <div class="meta">${esc(c.detail||"")} · ${ago(c.at)} ago</div>
    </div></div>`).join("") : `<span class="muted">no health data (monitor offline?)</span>`;

  const hp = d.hostProjects || {allowed:[],running:[]};
  const hostsBusy = $("hosts").querySelector(".promptbox.open") || $("hosts").contains(document.activeElement);
  if (!hostsBusy) {
  $("hosts").innerHTML = (hp.allowed||[]).map(p => {
    const running = (hp.running||[]).includes(p);
    return `<div class="row host" data-project="${esc(p)}">
      <div style="flex:1">
        <span class="name">${esc(p)}</span>
        <span class="tag ${running?"run":"idle"}">${running?"live":"idle"}</span>
        <div class="promptbox" id="pb-${esc(p)}">
          <input placeholder="prompt ${esc(p)}…" />
          <button>send</button>
        </div>
      </div></div>`;
  }).join("") || `<span class="muted">host-runner unreachable</span>`;

  document.querySelectorAll(".host").forEach(el => {
    const project = el.dataset.project;
    el.querySelector(".name").onclick = () => $("pb-"+project).classList.toggle("open");
    const box = $("pb-"+project), input = box.querySelector("input"), btn = box.querySelector("button");
    const send = async () => { const m = input.value.trim(); if(!m) return; btn.textContent="…";
      try { await fetch(`/api/host/${encodeURIComponent(project)}/prompt`, {method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({message:m})}); input.value=""; btn.textContent="sent ✓"; }
      catch { btn.textContent="err"; } setTimeout(()=>btn.textContent="send",1500); };
    btn.onclick = send; input.onkeydown = (e)=>{ if(e.key==="Enter") send(); };
  });
  }

  const agents = d.agents || [];
  $("agents").innerHTML = agents.length ? agents.map(a => `
    <div class="row"><div style="flex:1">
      <span class="name">${esc(a.name)}</span> <span class="tag ${a.status==="running"?"run":"idle"}">${esc(a.status)}</span>
      <div class="meta">${esc(a.cwd||"")}${a.currentTask?" · "+esc(a.currentTask.slice(0,60)):""}</div>
    </div></div>`).join("") : `<span class="muted">no container agents running</span>`;

  const sys = d.system || {};
  $("system").innerHTML = `
    <div class="row"><span class="name">uptime</span><span class="meta">${sys.uptime?Math.round(sys.uptime/1000)+"s":"—"}</span></div>
    <div class="row"><span class="name">container agents</span><span class="meta">${sys.agentCount??"—"}</span></div>
    <div class="row"><span class="name">host projects</span><span class="meta">${(hp.allowed||[]).length} (${(hp.running||[]).length} live)</span></div>
    <div class="row"><span class="name">components ok</span><span class="meta">${checks.filter(c=>c.status==="ok").length}/${checks.length}</span></div>`;
}

// ── Live output stream ───────────────────────────────────
const logEl = $("log");
function logLine(html){ const div = document.createElement("div"); div.style.marginBottom="4px"; div.innerHTML = html; logEl.appendChild(div); while(logEl.children.length>300) logEl.removeChild(logEl.firstChild); logEl.scrollTop = logEl.scrollHeight; }
function connectStream(){
  const proto = location.protocol === "https:" ? "wss" : "ws";
  const ws = new WebSocket(`${proto}://${location.host}/api/stream`);
  ws.onopen = () => { $("streamState").textContent = "● live"; $("streamState").style.color = "var(--ok)"; };
  ws.onclose = () => { $("streamState").textContent = "reconnecting…"; $("streamState").style.color = "var(--warn)"; setTimeout(connectStream, 3000); };
  ws.onerror = () => ws.close();
  ws.onmessage = (e) => {
    let m; try { m = JSON.parse(e.data); } catch { return; }
    const label = esc(m.project || m.agentId || "?");
    const t = new Date().toISOString().slice(11,19);
    const ts = `<span class="muted">${t}</span>`;
    if (m.type === "message_complete") {
      logLine(`${ts} <span style="color:var(--accent2)">${label} ▸</span>\n${esc(String(m.data||"").trim())}`);
    } else if (m.type === "tool_start") {
      const d = m.data || {}; const cmd = (d.args && d.args.command) || d.toolName || "";
      logLine(`${ts} <span style="color:var(--accent)">🔧 ${label}</span> ${esc(String(cmd).slice(0,140))}`);
    } else if (m.type === "status_change") {
      const s = (m.data && m.data.status) || "";
      if (s === "running" || s === "idle") logLine(`${ts} <span class="muted">▸ ${label} ${esc(s)}</span>`);
    }
  };
}
connectStream();

$("refresh").onclick = refresh;
setInterval(refresh, 5000);
setInterval(()=>{ $("clock").textContent = new Date().toISOString().slice(11,19)+"Z"; }, 1000);
refresh();
</script>
</body>
</html>
